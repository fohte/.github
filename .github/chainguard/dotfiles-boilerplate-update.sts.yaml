issuer: https://token.actions.githubusercontent.com
subject_pattern: ^repo:fohte/dotfiles:ref:refs/heads/master$
claim_pattern:
  job_workflow_ref: ^fohte/dotfiles/\.github/workflows/boilerplate-update\.yml@[^@]+$
repositories:
  - dotfiles
permissions:
  contents: write
  pull_requests: write
  workflows: write
