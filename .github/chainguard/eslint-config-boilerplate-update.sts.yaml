issuer: https://token.actions.githubusercontent.com
subject_pattern: ^repo:fohte/eslint-config:ref:refs/heads/master$
claim_pattern:
  job_workflow_ref: ^fohte/eslint-config/\.github/workflows/boilerplate-update\.yml@[^@]+$
repositories:
  - eslint-config
permissions:
  contents: write
  pull_requests: write
