issuer: https://token.actions.githubusercontent.com
subject_pattern: ^repo:fohte/infra:.*$
claim_pattern:
  job_workflow_ref: ^fohte/infra/\.github/workflows/(terraform-apply|terraform-test)\.yml@[^@]+$
permissions:
  # The copier template (fohte/generic-boilerplate) ships `.github/workflows/*.yml`,
  # so the initial push for a new repository requires the workflows permission.
  contents: write
  workflows: write
