issuer: https://token.actions.githubusercontent.com
subject_pattern: ^repo:fohte/meshi:ref:refs/heads/.+$
claim_pattern:
  job_workflow_ref: ^fohte/meshi/\.github/workflows/bootstrap\.yml@[^@]+$
repositories:
  - meshi
permissions:
  contents: write
  # `bootstrap.yml` deletes itself (a file under `.github/workflows/`),
  # which requires `workflows: write`.
  workflows: write
