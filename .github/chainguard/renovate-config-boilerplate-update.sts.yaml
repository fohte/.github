issuer: https://token.actions.githubusercontent.com
subject_pattern: ^repo:fohte/renovate-config:ref:refs/heads/master$
claim_pattern:
  job_workflow_ref: ^fohte/renovate-config/\.github/workflows/boilerplate-update\.yml@[^@]+$
repositories:
  - renovate-config
permissions:
  contents: write
  pull_requests: write
  workflows: write
