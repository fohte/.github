issuer: https://token.actions.githubusercontent.com
subject_pattern: ^repo:fohte/.github:ref:refs/heads/main$
claim_pattern:
  job_workflow_ref: ^fohte/.github/\.github/workflows/boilerplate-update\.yml@[^@]+$
repositories:
  - .github
permissions:
  contents: write
  pull_requests: write
  workflows: write
