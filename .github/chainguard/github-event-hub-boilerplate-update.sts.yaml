issuer: https://token.actions.githubusercontent.com
subject_pattern: ^repo:fohte/github-event-hub:ref:refs/heads/main$
claim_pattern:
  job_workflow_ref: ^fohte/github-event-hub/\.github/workflows/boilerplate-update\.yml@[^@]+$
repositories:
  - github-event-hub
permissions:
  contents: write
  pull_requests: write
  workflows: write
